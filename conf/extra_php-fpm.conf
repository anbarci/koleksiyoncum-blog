; Koleksiyoncum blog — PHP-FPM ek ayarları
; Bu dosya ynh_config_add_phpfpm tarafından pool config'e eklenir.

; Upload sınırları (ynh_app_setting ile de ayarlanabilir)
php_value[upload_max_filesize] = 10M
php_value[post_max_size]       = 10M
php_value[memory_limit]        = 64M
php_value[max_execution_time]  = 30
