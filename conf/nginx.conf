#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

    alias __INSTALL_DIR__/;
    index index.php;

    # posts.json'ı dışarıdan koru
    location ~* /posts\.json$ {
        deny all;
        return 404;
    }

    # SEO temiz URL'leri
    location ~ ^__PATH__/yazi/([a-z0-9-]+)/?$ {
        rewrite ^__PATH__/yazi/([a-z0-9-]+)/?$ __PATH__/index.php?p=$1 last;
    }
    location ~ ^__PATH__/kategori/([a-z0-9-]+)/?$ {
        rewrite ^__PATH__/kategori/([a-z0-9-]+)/?$ __PATH__/index.php?cat=$1 last;
    }
    location ~ ^__PATH__/sitemap\.xml$ {
        rewrite ^__PATH__/sitemap\.xml$ __PATH__/index.php?sitemap last;
    }
    location ~ ^__PATH__/robots\.txt$ {
        rewrite ^__PATH__/robots\.txt$ __PATH__/index.php?robots last;
    }
    location ~ ^__PATH__/rss\.xml$ {
        rewrite ^__PATH__/rss\.xml$ __PATH__/index.php?feed last;
    }
    location ~ ^__PATH__/admin/?$ {
        rewrite ^__PATH__/admin/?$ __PATH__/index.php?section=admin last;
    }

    try_files $uri $uri/ index.php;

    # PHP-FPM
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param REMOTE_USER     $remote_user;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Güvenlik başlıkları
    add_header X-Content-Type-Options "nosniff"                   always;
    add_header X-Frame-Options        "SAMEORIGIN"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
